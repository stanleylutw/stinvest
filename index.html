<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ST投資總表</title>
  <meta name="application-name" content="ST投資總表" />
  <meta name="apple-mobile-web-app-title" content="ST投資總表" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f8f9b" />

  <link rel="icon" type="image/png" sizes="32x32" href="./stinvest_logo3.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./stinvest_logo3.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./stinvest_logo3.png" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ST投資總表" />
  <meta property="og:title" content="ST投資總表" />
  <meta property="og:description" content="ST投資總表" />
  <meta property="og:url" content="https://stanleylutw.github.io/stinvest/" />
  <meta property="og:image" content="https://stanleylutw.github.io/stinvest/stinvest_logo3.png" />
  <meta property="og:image:alt" content="ST投資總表" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ST投資總表" />
  <meta name="twitter:description" content="ST投資總表" />
  <meta name="twitter:image" content="https://stanleylutw.github.io/stinvest/stinvest_logo3.png" />
  <style>
    :root {
      --bg: #f4f6ef;
      --ink: #1d2939;
      --muted: #5b6676;
      --surface: #fffdfa;
      --line: #dcd8cf;
      --gain: #ce3a2b;
      --loss: #1a8f4d;
      --accent: #005f73;
      --accent-soft: #d7edee;
      --sun: #f4a261;
      --violet: #5e548e;
      --card-shadow: 0 10px 30px rgba(56, 56, 56, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(1100px 600px at -10% -20%, #f6e7d8 0%, transparent 60%),
        radial-gradient(900px 450px at 100% 0%, #d9eef0 0%, transparent 55%),
        var(--bg);
    }

    .wrap {
      width: min(1200px, 94vw);
      margin: 2.4rem auto 3rem;
    }

    .auth-card {
      margin-bottom: 1rem;
    }

    .settings-fab {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .money-visibility-btn {
      border: none;
      background: transparent;
      color: #64748b;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .money-visibility-btn:hover {
      color: #334155;
    }

    .money-eye-icon {
      width: 22px;
      height: 22px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .money-eye-icon .fill {
      fill: currentColor;
      stroke: none;
    }

    .settings-fab:hover {
      opacity: 0.88;
    }

    .settings-icon-img {
      width: 70%;
      height: 70%;
      display: block;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .settings-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1190;
    }

    .settings-open .settings-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      margin: 0;
      border-radius: 0;
      border-left: none;
      transform: translateX(104%);
      transition: transform 0.25s ease;
      z-index: 1210;
      overflow-y: auto;
      padding: 0;
      box-shadow: -18px 0 36px rgba(15, 23, 42, 0.2);
      background:
        radial-gradient(1100px 600px at -10% -20%, #f6e7d8 0%, transparent 60%),
        radial-gradient(900px 450px at 100% 0%, #d9eef0 0%, transparent 55%),
        var(--bg);
      overflow-x: hidden;
    }

    .settings-open .settings-panel {
      transform: translateX(0);
    }

    .settings-panel.card {
      padding: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background:
        radial-gradient(1100px 600px at -10% -20%, #f6e7d8 0%, transparent 60%),
        radial-gradient(900px 450px at 100% 0%, #d9eef0 0%, transparent 55%),
        var(--bg);
    }

    .settings-wrap {
      width: min(1200px, 94vw);
      margin: 2.4rem auto 3rem;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.55rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: var(--surface);
      box-shadow: var(--card-shadow);
    }

    .settings-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: 0.01em;
      color: #1e293b;
    }

    .settings-back-btn {
      border: none;
      background: transparent;
      color: #334155;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
    }

    .settings-back-btn:hover {
      background: #f1f5f9;
    }

    .settings-close {
      display: none;
    }

    .settings-body {
      padding: 0.85rem 0 0;
      display: grid;
      gap: 0.9rem;
      min-width: 0;
    }

    .settings-group {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: var(--card-shadow);
      min-width: 0;
    }

    .settings-group-title {
      margin: 0 0 0.65rem;
      font-size: 0.83rem;
      color: #64748b;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .auth-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.65rem;
      align-items: center;
    }

    .auth-user {
      color: #334155;
      font-size: 0.95rem;
      min-height: 38px;
      border: 1px solid #e2e8f0;
      border-radius: 0.7rem;
      display: flex;
      align-items: center;
      padding: 0.45rem 0.6rem;
      background: #f8fafc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .field-label {
      display: block;
      color: #475569;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .auth-sheet-row {
      margin-top: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.6rem;
      align-items: center;
    }

    .auth-sheet-row input {
      width: 100%;
      border: 1px solid #d8dee8;
      border-radius: 0.7rem;
      padding: 0.62rem 0.7rem;
      font-size: 0.92rem;
      background: #fff;
      color: #1e293b;
    }

    .auth-sheet-status {
      margin-top: 0;
      font-size: 0.84rem;
      color: #64748b;
      line-height: 1.45;
      word-break: break-all;
    }

    .auth-sheet-status.error {
      color: #b42318;
    }

    .auth-sync-row {
      margin-top: 0.55rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .sync-mode-row {
      margin-top: 0.15rem;
      margin-bottom: 0.25rem;
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 0.55rem;
      align-items: center;
    }

    .sync-mode-label {
      color: #475569;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .sync-mode-select {
      width: 100%;
      min-width: 0;
      border: 1px solid #d8dee8;
      border-radius: 0.7rem;
      padding: 0.5rem 0.65rem;
      background: #fff;
      color: #1e293b;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .sync-mode-hint {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .auth-sync-status {
      font-size: 0.84rem;
      color: #64748b;
      line-height: 1.45;
      word-break: break-word;
    }

    .auth-sync-status.error {
      color: #b42318;
    }

    .btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #1e293b;
      border-radius: 0.7rem;
      padding: 0.5rem 0.8rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: #f8fafc;
    }

    .btn.primary {
      border-color: #0f766e;
      background: #0f766e;
      color: #fff;
    }

    .btn.primary:hover {
      background: #0d6a63;
    }

    .btn.full {
      width: 100%;
      justify-content: center;
    }

    .app-locked #sec-overview,
    .app-locked #sec-kpis,
    .app-locked #sec-holdings,
    .app-locked #sec-distribution,
    .app-locked #sec-history-trend,
    .app-locked #sec-alloc,
    .app-locked .footer {
      display: none;
    }

    .wrap > section + section {
      margin-top: 1rem;
    }

    .hero {
      background: linear-gradient(125deg, #004e64, #0a9396);
      color: #f4fbfc;
      border-radius: 1rem;
      padding: 0.6rem 0.84rem;
      box-shadow: var(--card-shadow);
      animation: enter 0.5s ease-out;
      position: relative;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(0.82rem, 1.54vw, 1.12rem);
    }

    .hero-updated {
      margin-top: 0.22rem;
      font-size: 0.68rem;
      color: #d5dde8;
      font-weight: 600;
      letter-spacing: 0.01em;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .refresh-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(213, 221, 232, 0.35);
      border-top-color: #d5dde8;
      border-radius: 50%;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.15s ease;
      animation: spin 0.7s linear infinite;
    }

    .refresh-spinner.active {
      opacity: 1;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 0.8rem;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0.9rem;
      padding: 0.75rem 0.8rem;
      box-shadow: var(--card-shadow);
      animation: enter 0.48s ease-out;
    }

    .kpi small {
      color: var(--muted);
      display: block;
      margin-bottom: 0.35rem;
    }

    .kpi-title-row {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    .kpi b {
      font-size: 1.2rem;
      line-height: 1.2;
    }

    .kpi-delta {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.82rem;
      font-weight: 700;
      font-style: normal;
      color: #667085;
    }

    .kpi-delta.up {
      color: var(--gain);
    }

    .kpi-delta.down {
      color: var(--loss);
    }

    .kpi-delta.flat {
      color: #6b7280;
    }

    .gain {
      color: var(--gain);
    }

    .loss {
      color: var(--loss);
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1.2fr 1fr;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: var(--card-shadow);
      animation: enter 0.55s ease-out;
    }

    h2 {
      margin: 0 0 0.75rem;
      font-size: 1.08rem;
      color: #233142;
    }

    .alloc-row {
      display: grid;
      grid-template-columns: 110px 1fr 60px;
      gap: 0.7rem;
      align-items: center;
      margin-bottom: 0.45rem;
    }

    .bar {
      background: #ebe8e0;
      border-radius: 999px;
      height: 11px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .c1 { background: linear-gradient(90deg, #005f73, #0a9396); }
    .c2 { background: linear-gradient(90deg, #9c6644, #dda15e); }
    .c3 { background: linear-gradient(90deg, #5e548e, #9f86c0); }
    .c4 { background: linear-gradient(90deg, #2a9d8f, #8ac926); }
    .c5 { background: linear-gradient(90deg, #6c757d, #adb5bd); }

    .notes li {
      margin: 0 0 0.45rem;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.52rem 0.46rem;
      border-bottom: 1px solid #ece9e1;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }

    thead th {
      color: #3f4d5f;
      font-weight: 700;
      background: #f5f2ec;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .footer {
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .empty-row td {
      text-align: center !important;
      color: var(--muted);
    }

    .group-row td {
      background: transparent;
      border: 0;
      padding: 8px 0 0;
    }

    .account-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.28rem 0.78rem;
      border-radius: 14px 14px 0 0;
      font-size: 0.9rem;
      font-weight: 700;
      color: #334155;
      border: 0;
      background: var(--group-bg, #e5e7eb);
    }

    .group-head-repeat td {
      background: var(--group-bg, #e5e7eb);
      color: #334155;
      font-weight: 700;
      border: 0;
    }

    .subtotal-row td {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
    }

    .group-gap td {
      border: 0;
      height: 10px;
      padding: 0;
      background: transparent;
    }

    .table-tools {
      display: flex;
      justify-content: flex-end;
      gap: 0.55rem;
      align-items: center;
      margin-bottom: 0;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    .table-tools select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.35rem 0.5rem;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .table-tools-alone {
      margin-bottom: 0.45rem;
    }

    .kpi-compare-info {
      margin-top: 0.5rem;
      color: #64748b;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.65rem;
      flex-wrap: nowrap;
    }

    .section-head h2 {
      margin: 0;
    }

    .collapsible-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .collapsible-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      color: #1f2937;
      padding: 0;
      text-align: left;
      font: inherit;
      font-weight: 700;
      font-size: 1.08rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .collapse-icon {
      color: #64748b;
      font-size: 1rem;
      transition: transform 0.2s ease;
    }

    .collapsible-section.is-collapsed .collapsible-body {
      display: none;
    }

    .collapsible-section.is-collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .hero .collapsible-toggle {
      color: #f4fbfc;
      font-size: clamp(1.2rem, 2.6vw, 1.8rem);
      font-weight: 800;
    }

    .hero .collapse-icon {
      color: #d9f4f7;
    }

    .hero .collapsible-head {
      margin-bottom: 0;
    }

    .dist-chart-wrap {
      border: 1px solid #e7e2d8;
      border-radius: 12px;
      background: #f3f4f6;
      padding: 0.4rem;
    }

    .dist-chart-legend {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.15rem;
      color: #334155;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .dist-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .dist-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
    }

    .dist-chart {
      width: 100%;
      min-height: 220px;
      overflow: hidden;
    }

    .dist-chart svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .history-tools {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
      color: #475569;
    }

    .history-tools select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.3rem 0.45rem;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .history-tools input[type="date"] {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.28rem 0.4rem;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .history-custom-range {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .history-custom-range.is-hidden {
      display: none;
    }

    .history-trend-wrap {
      border: 1px solid #e7e2d8;
      border-radius: 12px;
      background: #f7f8fa;
      padding: 0.45rem;
    }

    .history-trend-chart {
      width: 100%;
      min-height: 260px;
      overflow: hidden;
    }

    .history-trend-chart svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .trend-up { color: var(--gain); font-weight: 700; }
    .trend-down { color: var(--loss); font-weight: 700; }
    .trend-flat { color: #6b7280; font-weight: 700; }

    @keyframes enter {
      from {
        transform: translateY(9px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 980px) {
      .kpis {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }

      .grid {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 640px) {
      .wrap {
        width: 95vw;
      }

      .wrap > section + section {
        margin-top: 0.85rem;
      }

      .kpis {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .hero {
        padding: 0.6rem 0.84rem;
      }

      .section-head {
        flex-wrap: wrap;
      }

      .settings-body {
        padding: 0.85rem 0 0;
      }

      .settings-panel {
        width: 100vw;
        box-shadow: none;
      }

      .settings-wrap {
        width: 95vw;
        margin: 1.2rem auto 2rem;
      }

      .auth-row {
        grid-template-columns: 1fr;
      }

      .sync-mode-row {
        grid-template-columns: 1fr;
        gap: 0.4rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="settingsBackdrop" class="settings-backdrop" aria-hidden="true"></div>
  <main class="wrap app-locked" id="appMain">
    <section id="sec-auth" class="card auth-card settings-panel" aria-hidden="true">
      <div class="settings-wrap">
        <div class="settings-head">
          <button id="btnBackSettings" class="settings-back-btn" type="button" aria-label="返回">←</button>
          <h2 class="settings-title">設定</h2>
          <button id="btnCloseSettings" class="settings-close" type="button">關閉</button>
        </div>
        <div class="settings-body">
          <div class="settings-group">
            <h3 class="settings-group-title">帳號</h3>
            <label class="field-label">目前帳號</label>
            <div class="auth-row">
              <span id="authUserText" class="auth-user">檢查登入中...</span>
              <button id="btnLoginGoogle" class="btn primary" type="button">Google 登入</button>
              <button id="btnLogout" class="btn" type="button" style="display:none;">登出</button>
            </div>
          </div>

    function resolveColumnIndexes(headerRow) {
      if (!headerRow || !headerRow.length) return;
      const map = {};
      for (let i = 0; i < headerRow.length; i += 1) {
        const key = cleanHeader(headerRow[i]);
        if (key) map[key] = i;
      }
      const pick = (names, fallback) => {
        for (const n of names) {
          if (Object.prototype.hasOwnProperty.call(map, n)) return map[n];
        }
        return fallback;
      };

      idx.name = pick(["股票/ETF"], idx.name);
      idx.title = pick(["標的"], idx.title);
      idx.profit = pick(["損益"], idx.profit);
      idx.profitRate = pick(["損益率"], idx.profitRate);
      idx.price = pick(["股價"], idx.price);
      idx.move = pick(["漲跌"], idx.move);
      idx.holdingCost = pick(["持有成本"], idx.holdingCost);

      idx.profitWithDividend = pick(["含息損益"], idx.profitWithDividend);
      idx.profitWithDividendRate = pick(["含息損益率"], idx.profitWithDividendRate);
      idx.marketValue = pick(["市值"], idx.marketValue);
      idx.dividendRate = pick(["配息率"], idx.dividendRate);
      idx.monthlyIncome = pick(["月配額", "預估月配額"], idx.monthlyIncome);
    }

    function toNumber(text) {
      if (!text) return NaN;
      const normalized = String(text).replace(/,/g, "").trim();
      const matched = normalized.match(/-?\d+(\.\d+)?/);
      return matched ? Number(matched[0]) : NaN;
    }

    function currency(text) {
      const n = toNumber(text);
      if (!Number.isFinite(n)) return "--";
      if (moneyMasked) return MONEY_MASK_TEXT;
      return "$" + n.toLocaleString("en-US");
    }

    function classByValue(text) {
      const n = toNumber(text);
      if (!Number.isFinite(n)) return "";
      if (n > 0) return "gain";
      if (n < 0) return "loss";
      return "";
    }

    function classByValueBlackPositive(text) {
      const n = toNumber(text);
      if (!Number.isFinite(n)) return "";
      if (n < 0) return "loss";
      return "";
    }

    function td(value, className = "") {
      return `<td class="${className}">${value || "--"}</td>`;
    }

    function isMoneyColumn(columnIndex) {
      const moneyColumns = [
        idx.price,
        idx.holdingCost,
        idx.accDividend,
        idx.profit,
        idx.profitWithDividend,
        idx.marketValue,
        idx.monthlyIncome
      ];
      return moneyColumns.includes(columnIndex);
    }

    function maskValueIfNeeded(value, columnIndex) {
      if (!moneyMasked || !isMoneyColumn(columnIndex)) return value;
      const numeric = toNumber(value);
      return Number.isFinite(numeric) ? MONEY_MASK_TEXT : value;
    }

    function cleanHeader(text) {
      return String(text || "").replace(/^\*+/, "").trim();
    }

    function isHiddenHeader(text) {
      return String(text || "").trim().startsWith("*");
    }

    function renderTableHeaders(headerRow) {
      if (!headerRow || !headerRow.length) return;
      const cols = [];
      for (let i = 1; i < headerRow.length; i += 1) {
        const raw = headerRow[i];
        const label = cleanHeader(raw);
        if (!label || isHiddenHeader(raw)) continue;
        cols.push({ index: i, label });
      }
      visibleColumns = cols;
      // Use group-level repeated headers only; keep table-level thead empty
      // to avoid duplicate header on the first account block.
      holdingsHead.innerHTML = "";
      rebuildSortOptions();
    }

    function visibleColumnCount() {
      return Math.max(visibleColumns.length + 1, 1);
    }

    function rebuildSortOptions() {
      const prev = sortByEl.value || "sheet";
      const options = [
        `<option value="sheet">Google Sheet 原始順序</option>`,
        ...visibleColumns.map((c) => `<option value="${c.index}">${c.label}</option>`)
      ];
      sortByEl.innerHTML = options.join("");
      const values = new Set(["sheet", ...visibleColumns.map((c) => String(c.index))]);
      sortByEl.value = values.has(prev) ? prev : "sheet";
    }

    function renderAlloc(groups, holdings) {
      const accountTotals = [];
      groups.forEach((r) => {
        const account = String(r[idx.name] || "").replace(/^#/, "").trim();
        const value = toNumber(r[idx.marketValue]) || 0;
        if (account && value > 0) {
          accountTotals.push({ account, value });
        }
      });

      if (!accountTotals.length) {
        const map = new Map();
        holdings.forEach((h) => {
          const value = toNumber(h.cells[idx.marketValue]) || 0;
          if (value > 0) map.set(h.account, (map.get(h.account) || 0) + value);
        });
        map.forEach((value, account) => accountTotals.push({ account, value }));
      }

      if (!accountTotals.length) {
        allocRows.innerHTML = `
          <div class="alloc-row">
            <span>無資料</span>
            <div class="bar"><span class="c1" style="width:0%"></span></div>
            <strong>0%</strong>
          </div>`;
        return;
      }

      accountTotals.sort((a, b) => b.value - a.value);
      const total = accountTotals.reduce((sum, x) => sum + x.value, 0);
      allocRows.innerHTML = accountTotals.map((x, i) => {
        const p = total > 0 ? (x.value / total) * 100 : 0;
        const klass = barClasses[i % barClasses.length];
        return `
          <div class="alloc-row">
            <span>${x.account}</span>
            <div class="bar"><span class="${klass}" style="width:${p.toFixed(1)}%"></span></div>
            <strong>${p.toFixed(1)}%</strong>
          </div>`;
      }).join("");
    }

    function parseDistribution(data) {
      const rows = data?.valueRanges?.[1]?.values || [];
      if (!rows.length) return [];

      const header = rows.find((r) => String(r[0] || "").trim() === "標的類別");
      const costRow = rows.find((r) => String(r[0] || "").trim() === "成本");
      const marketRow = rows.find((r) => String(r[0] || "").trim() === "現值");
      const dividendRow = rows.find((r) => String(r[0] || "").trim() === "配息");
      const weightRow = rows.find((r) => String(r[0] || "").trim() === "總投資佔比");
      const pnlRow = rows.find((r) => String(r[0] || "").trim() === "淨損益");
      const retRow = rows.find((r) => String(r[0] || "").trim() === "含息報酬率");

      if (!header) return [];

      const out = [];
      for (let i = 1; i < header.length; i += 1) {
        const name = String(header[i] || "").trim();
        if (!name || name === "合計") continue;
        out.push({
          name,
          cost: costRow?.[i] || "",
          market: marketRow?.[i] || "",
          dividend: dividendRow?.[i] || "",
          weight: weightRow?.[i] || "",
          pnl: pnlRow?.[i] || "",
          ret: retRow?.[i] || ""
        });
      }
      return out;
    }

    function normalizeReportDate(text) {
      const src = String(text || "").trim();
      if (!src) return "";
      const m = src.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (!m) return src;
      const y = m[1];
      const mo = m[2].padStart(2, "0");
      const d = m[3].padStart(2, "0");
      return `${y}/${mo}/${d}`;
    }

    function dateToMs(dateText) {
      const s = normalizeReportDate(dateText).replace(/\//g, "-");
      const t = new Date(`${s}T00:00:00`).getTime();
      return Number.isFinite(t) ? t : Number.NEGATIVE_INFINITY;
    }

    function toMs(dateTimeText) {
      const src = String(dateTimeText || "").trim();
      if (!src) return Number.NEGATIVE_INFINITY;
      const m = src.match(
        /^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})(?:[ T](\d{1,2})(?::(\d{1,2}))?(?::(\d{1,2}))?)?$/
      );
      const safe = m
        ? `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}T${(m[4] || "0").padStart(2, "0")}:${(m[5] || "0").padStart(2, "0")}:${(m[6] || "0").padStart(2, "0")}`
        : src.replace(" ", "T");
      const t = new Date(safe).getTime();
      return Number.isFinite(t) ? t : Number.NEGATIVE_INFINITY;
    }

    function parseHistory(data) {
      const rows = data?.valueRanges?.[2]?.values || [];
      if (rows.length < 2) return { rows: [], daily: [], latest: null, snapshots: [] };

      const header = rows[0].map((h) => String(h || "").trim());
      const col = (name) => header.indexOf(name);

      const iTs = col("時間戳記");
      const iBatch = col("批次ID");
      const iDate = col("報表日期");
      const iMetric = col("標的類別");
      const iTotal = col("合計");

      const hasNewFormatHeader = [iTs, iBatch, iDate, iMetric, iTotal].every((i) => i >= 0);
      const parsedRows = hasNewFormatHeader
        ? rows.slice(1).map((r) => ({
            timestamp: String(r[iTs] || "").trim(),
            batchId: String(r[iBatch] || "").trim(),
            reportDate: normalizeReportDate(r[iDate]),
            metric: String(r[iMetric] || "").trim(),
            totalText: String(r[iTotal] || "").trim(),
            total: toNumber(r[iTotal]),
            byCategory: (() => {
              const out = {};
              for (let c = iMetric + 1; c < iTotal; c += 1) {
                const cat = String(header[c] || "").trim();
                if (!cat) continue;
                out[cat] = {
                  text: String(r[c] || "").trim(),
                  value: toNumber(r[c])
                };
              }
              return out;
            })()
          })).filter((r) => r.reportDate && r.metric)
        : [];

      // Fallback for legacy history blocks:
      // date row -> 標的類別 -> 成本 -> 現值 -> 配息 -> ... -> 報酬率
      const legacySnapshots = [];
      for (let i = 0; i + 7 < rows.length; i += 1) {
        const d0 = normalizeReportDate(rows[i]?.[0] || "");
        const k1 = String(rows[i + 1]?.[0] || "").trim();
        const kCost = String(rows[i + 2]?.[0] || "").trim();
        const kMv = String(rows[i + 3]?.[0] || "").trim();
        const kDiv = String(rows[i + 4]?.[0] || "").trim();
        const kRet = String(rows[i + 7]?.[0] || "").trim();
        if (!d0 || k1 !== "標的類別" || kCost !== "成本" || kMv !== "現值" || kDiv !== "配息" || kRet !== "報酬率") {
          continue;
        }
        legacySnapshots.push({
          reportDate: d0,
          batchId: `legacy_${d0.replace(/\//g, "")}`,
          timestamp: `${d0.replace(/\//g, "-")} 18:00:00`,
          metrics: {
            成本: { text: String(rows[i + 2]?.[9] || "").trim(), value: toNumber(rows[i + 2]?.[9]) },
            現值: { text: String(rows[i + 3]?.[9] || "").trim(), value: toNumber(rows[i + 3]?.[9]) },
            配息: { text: String(rows[i + 4]?.[9] || "").trim(), value: toNumber(rows[i + 4]?.[9]) },
            淨損益: { text: String(rows[i + 3]?.[11] || "").trim(), value: toNumber(rows[i + 3]?.[11]) },
            含息報酬率: { text: String(rows[i + 7]?.[9] || "").trim(), value: toNumber(rows[i + 7]?.[9]) }
          }
        });
      }

      const batches = new Map();
      parsedRows.forEach((r) => {
        const key = `${r.reportDate}__${r.batchId || r.timestamp}`;
        if (!batches.has(key)) {
          batches.set(key, {
            reportDate: r.reportDate,
            batchId: r.batchId,
            timestamp: r.timestamp,
            metrics: {}
          });
        }
        const item = batches.get(key);
        item.metrics[r.metric] = {
          text: r.totalText,
          value: r.total,
          byCategory: r.byCategory || {}
        };
      });

      legacySnapshots.forEach((s) => {
        const key = `${s.reportDate}__${s.batchId || s.timestamp}`;
        if (!batches.has(key)) {
          batches.set(key, {
            reportDate: s.reportDate,
            batchId: s.batchId,
            timestamp: s.timestamp,
            metrics: {}
          });
        }
        const item = batches.get(key);
        item.metrics = { ...item.metrics, ...s.metrics };
      });

      const dailyMap = new Map();
      Array.from(batches.values()).forEach((b) => {
        const prev = dailyMap.get(b.reportDate);
        if (!prev || toMs(b.timestamp) > toMs(prev.timestamp)) {
          dailyMap.set(b.reportDate, b);
        }
      });

      const daily = Array.from(dailyMap.values()).sort((a, b) => dateToMs(a.reportDate) - dateToMs(b.reportDate));
      const latest = daily.length ? daily[daily.length - 1] : null;
      const snapshots = Array.from(batches.values()).sort((a, b) => toMs(a.timestamp) - toMs(b.timestamp));

      return { rows: parsedRows, daily, latest, snapshots };
    }

    function getHistoryMetricDef(key) {
      return HISTORY_METRIC_OPTIONS.find((x) => x.key === key) || HISTORY_METRIC_OPTIONS[0];
    }

    function getSnapshotMetric(snapshot, key) {
      if (key === "none") return NaN;
      return snapshotMetricValue(snapshot, key);
    }

    function formatAxisValue(v, axisType) {
      if (!Number.isFinite(v)) return "--";
      if (axisType === "percent") return `${v.toFixed(0)}%`;
      if (axisType === "value") {
        if (moneyMasked) return MONEY_MASK_TEXT;
        const wan = v / 10000;
        const abs = Math.abs(wan);
        const digits = abs >= 100 ? 0 : (abs >= 10 ? 1 : 2);
        return wan.toLocaleString("en-US", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits
        });
      }
      return Number(v).toLocaleString("en-US");
    }

    function formatMetricLabel(def) {
      if (!def) return "";
      if (def.axis === "value") return `${def.label}（萬元）`;
      return def.label;
    }

    function setupHistorySelectors() {
      if (!histY1Select || !histY2Select) return;
      if (histY1Select.options.length > 0) return;
      const opts = HISTORY_METRIC_OPTIONS.map((x) => `<option value="${x.key}">${x.label}</option>`).join("");
      histY1Select.innerHTML = opts;
      histY2Select.innerHTML = opts;
      histY1Select.value = "含息損益";
      histY2Select.value = "none";
    }

    function normalizeToDashDate(reportDate) {
      return normalizeReportDate(reportDate).replace(/\//g, "-");
    }

    function filterHistoryByRange(daily) {
      const rows = Array.isArray(daily) ? daily : [];
      if (!rows.length || !histRangeSelect) return rows;

      const mode = histRangeSelect.value || "all";
      if (histCustomRange) {
        histCustomRange.classList.toggle("is-hidden", mode !== "custom");
      }
      if (mode === "all") return rows;

      const last = rows[rows.length - 1];
      const endMs = dateToMs(last?.reportDate);
      if (!Number.isFinite(endMs)) return rows;

      if (mode === "custom") {
        let fromMs = histFromDate?.value ? dateToMs(histFromDate.value) : Number.NEGATIVE_INFINITY;
        let toMsVal = histToDate?.value ? dateToMs(histToDate.value) : Number.POSITIVE_INFINITY;
        if (fromMs > toMsVal) {
          const t = fromMs;
          fromMs = toMsVal;
          toMsVal = t;
        }

        const inRange = rows.filter((r) => {
          const t = dateToMs(r.reportDate);
          return t >= fromMs && t <= toMsVal;
        });
        if (inRange.length > 0) return inRange;

        // If user-selected range has no exact points, still use nearest available points.
        let nearestAfterFrom = null;
        let nearestBeforeTo = null;
        for (const r of rows) {
          const t = dateToMs(r.reportDate);
          if (t >= fromMs && (!nearestAfterFrom || t < dateToMs(nearestAfterFrom.reportDate))) {
            nearestAfterFrom = r;
          }
          if (t <= toMsVal && (!nearestBeforeTo || t > dateToMs(nearestBeforeTo.reportDate))) {
            nearestBeforeTo = r;
          }
        }

        const picked = [];
        if (nearestBeforeTo) picked.push(nearestBeforeTo);
        if (nearestAfterFrom && nearestAfterFrom !== nearestBeforeTo) picked.push(nearestAfterFrom);
        return picked.sort((a, b) => dateToMs(a.reportDate) - dateToMs(b.reportDate));
      }

      const dayMap = { month: 30, quarter: 90, year: 365 };
      const days = dayMap[mode];
      if (!days) return rows;
      const startMs = endMs - days * 24 * 60 * 60 * 1000;
      return rows.filter((r) => dateToMs(r.reportDate) >= startMs);
    }

    function updateHistoryDateBounds(daily) {
      if (!histFromDate || !histToDate) return;
      if (!Array.isArray(daily) || !daily.length) return;
      const minDate = normalizeToDashDate(daily[0].reportDate);
      const maxDate = normalizeToDashDate(daily[daily.length - 1].reportDate);
      histFromDate.min = minDate;
      histFromDate.max = maxDate;
      histToDate.min = minDate;
      histToDate.max = maxDate;
      if (!histFromDate.value) histFromDate.value = minDate;
      if (!histToDate.value) histToDate.value = maxDate;
    }

    function renderHistoryTrendChart(daily) {
      if (!historyTrendChart) return;
      const rows = filterHistoryByRange(daily || []);
      if (!rows.length) {
        historyTrendChart.textContent = "無歷史資料";
        return;
      }

      setupHistorySelectors();
      const y1Key = histY1Select.value || "現值";
      const y2Key = histY2Select.value || "none";
      const y1Def = getHistoryMetricDef(y1Key);
      const y2Def = getHistoryMetricDef(y2Key);

      const series = rows.map((r) => ({
        d: r.reportDate,
        y1: getSnapshotMetric(r, y1Key),
        y2: getSnapshotMetric(r, y2Key)
      }));
      const valid = series.filter((x) => Number.isFinite(x.y1) || Number.isFinite(x.y2));
      if (!valid.length) {
        historyTrendChart.textContent = "歷史資料不足（欄位無可用數值）";
        return;
      }

      const wrap = historyTrendChart.closest(".history-trend-wrap");
      const measuredWidth = Math.floor(
        historyTrendChart.getBoundingClientRect().width ||
        wrap?.getBoundingClientRect().width ||
        0
      );
      const w = Math.max(760, measuredWidth);
      const h = Math.min(460, Math.max(300, Math.round(w * 0.28)));
      const m = { l: 74, r: 74, t: 16, b: 44 };
      const pw = w - m.l - m.r;
      const ph = h - m.t - m.b;
      const n = valid.length;
      const showY1 = y1Key !== "none";
      const showY2 = y2Key !== "none";

      const y1Vals = valid.map((x) => x.y1).filter(Number.isFinite);
      const y2Vals = valid.map((x) => x.y2).filter(Number.isFinite);
      const range = (vals) => {
        if (!vals.length) return [0, 1];
        let min = Math.min(...vals);
        let max = Math.max(...vals);
        if (min === max) {
          const p = Math.abs(min) || 1;
          min -= p * 0.05;
          max += p * 0.05;
        }
        const pad = (max - min) * 0.08;
        return [min - pad, max + pad];
      };
      const [y1Min, y1Max] = range(y1Vals);
      const [y2Min, y2Max] = range(y2Vals);

      const xAt = (i) => m.l + (n === 1 ? pw / 2 : (i / (n - 1)) * pw);
      const yAt1 = (v) => m.t + ph * (1 - (v - y1Min) / (y1Max - y1Min));
      const yAt2 = (v) => m.t + ph * (1 - (v - y2Min) / (y2Max - y2Min));

      const pathFrom = (key, yFn) => {
        let d = "";
        valid.forEach((p, i) => {
          const v = p[key];
          if (!Number.isFinite(v)) return;
          const x = xAt(i);
          const y = yFn(v);
          d += d ? ` L ${x} ${y}` : `M ${x} ${y}`;
        });
        return d;
      };
      const p1 = showY1 ? pathFrom("y1", yAt1) : "";
      const p2 = showY2 ? pathFrom("y2", yAt2) : "";

      const yTicks = 5;
      const grid = Array.from({ length: yTicks + 1 }, (_, i) => {
        const t = i / yTicks;
        const y = m.t + ph * t;
        const v1 = y1Max - (y1Max - y1Min) * t;
        const v2 = y2Max - (y2Max - y2Min) * t;
        return `
          <line x1="${m.l}" y1="${y}" x2="${w - m.r}" y2="${y}" stroke="#dde2ea" stroke-width="1" />
          <text x="${m.l - 10}" y="${y + 4}" text-anchor="end" font-size="11" fill="#4b5563">${showY1 ? formatAxisValue(v1, y1Def.axis) : ""}</text>
          <text x="${w - m.r + 10}" y="${y + 4}" text-anchor="start" font-size="11" fill="#4b5563">${showY2 ? formatAxisValue(v2, y2Def.axis) : ""}</text>
        `;
      }).join("");

      const xStep = Math.max(1, Math.ceil(n / 8));
      const xLabels = valid.map((p, i) => {
        if (i % xStep !== 0 && i !== n - 1) return "";
        return `<text x="${xAt(i)}" y="${m.t + ph + 22}" text-anchor="middle" font-size="11" fill="#334155">${p.d}</text>`;
      }).join("");

      const points = (key, yFn, color) => valid.map((p, i) => {
        const v = p[key];
        if (!Number.isFinite(v)) return "";
        return `<circle cx="${xAt(i)}" cy="${yFn(v)}" r="2.8" fill="${color}" />`;
      }).join("");

      historyTrendChart.innerHTML = `
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="${w}" height="${h}" fill="#f7f8fa" />
          ${grid}
          ${showY1 ? `<path d="${p1}" fill="none" stroke="#2563eb" stroke-width="2.2" />` : ""}
          ${showY2 ? `<path d="${p2}" fill="none" stroke="#64748b" stroke-width="2.2" />` : ""}
          ${showY1 ? points("y1", yAt1, "#2563eb") : ""}
          ${showY2 ? points("y2", yAt2, "#64748b") : ""}
          <line x1="${m.l}" y1="${m.t + ph}" x2="${w - m.r}" y2="${m.t + ph}" stroke="#64748b" stroke-width="1.3" />
          ${xLabels}
          ${showY1 ? `<text x="${m.l}" y="${13}" text-anchor="start" font-size="11" fill="#2563eb" font-weight="700">${formatMetricLabel(y1Def)}</text>` : ""}
          ${showY2 ? `<text x="${w - m.r}" y="${13}" text-anchor="end" font-size="11" fill="#64748b" font-weight="700">${formatMetricLabel(y2Def)}</text>` : ""}
        </svg>
      `;
    }

    function trendText(delta) {
      if (!Number.isFinite(delta)) return { cls: "trend-flat", text: "■ --", fill: "#6b7280" };
      if (delta > 0) return { cls: "trend-up", text: `▲ +${Math.abs(delta).toFixed(2)}%`, fill: "#ce3a2b" };
      if (delta < 0) return { cls: "trend-down", text: `▼ -${Math.abs(delta).toFixed(2)}%`, fill: "#1a8f4d" };
      return { cls: "trend-flat", text: "■ 0.00%", fill: "#6b7280" };
    }

    function buildDistributionDeltaInfo(items, summary, history) {
      const currentMarket = toNumber(summary?.[idx.marketValue]);
      const baseline = findBaselineSnapshot(history, currentMarket);
      if (!baseline) return { baseline: null, byName: new Map() };
      const byW = baseline.metrics?.["總投資佔比"]?.byCategory || {};
      const byR = baseline.metrics?.["含息報酬率"]?.byCategory || {};
      const byName = new Map();
      items.forEach((x) => {
        const wNow = toNumber(x.weight);
        const rNow = toNumber(x.ret);
        const wPrev = Number.isFinite(byW[x.name]?.value) ? byW[x.name].value : NaN;
        const rPrev = Number.isFinite(byR[x.name]?.value) ? byR[x.name].value : NaN;
        byName.set(x.name, {
          w: trendText(wNow - wPrev),
          r: trendText(rNow - rPrev)
        });
      });
      return { baseline, byName };
    }

    function renderDistribution(items, deltaInfo = null) {
      if (!items.length) {
        distChart.textContent = "無第二分頁資料";
        return;
      }

      const list = [...items];
      const values = list.map((x) => ({
        name: x.name,
        weight: toNumber(x.weight) || 0,
        ret: toNumber(x.ret) || 0
      }));

      const maxValue = Math.max(...values.map((x) => Math.max(x.weight, x.ret)), 0);
      const yMax = Math.max(150, Math.ceil(maxValue / 10) * 10);
      const tickStep = yMax >= 150 ? 50 : 20;
      const ticks = [];
      for (let t = 0; t <= yMax; t += tickStep) ticks.push(t);

      const margin = { left: 42, right: 18, top: 18, bottom: 62 };
      const wrap = distChart.closest(".dist-chart-wrap");
      const measuredWidth = Math.floor(
        distChart.getBoundingClientRect().width ||
        wrap?.getBoundingClientRect().width ||
        0
      );
      const chartW = Math.max(720, measuredWidth);
      const chartH = Math.min(460, Math.max(290, Math.round(chartW * 0.24)));
      const plotH = chartH - margin.top - margin.bottom;
      const plotW = chartW - margin.left - margin.right;
      const n = Math.max(values.length, 1);
      const slotW = plotW / n;
      const groupW = Math.min(72, Math.max(20, slotW * 0.64));
      const barGap = Math.max(3, Math.min(8, groupW * 0.1));
      const barW = (groupW - barGap) / 2;

      const y = (v) => margin.top + plotH * (1 - v / yMax);
      const xCenter = (i) => margin.left + ((i + 0.5) / n) * plotW;

      const gridLines = ticks.map((t) => `
        <line x1="${margin.left}" y1="${y(t)}" x2="${chartW - margin.right}" y2="${y(t)}" stroke="#d6d9de" stroke-width="1" />
        <text x="${margin.left - 8}" y="${y(t) + 4}" text-anchor="end" font-size="12" fill="#4b5563">${t}%</text>
      `).join("");

      const bars = values.map((v, i) => {
        const cx = xCenter(i);
        const wH = Math.max(0, Math.min(yMax, v.weight));
        const rH = Math.max(0, Math.min(yMax, v.ret));
        const wY = y(wH);
        const rY = y(rH);
        const wBarH = margin.top + plotH - wY;
        const rBarH = margin.top + plotH - rY;
        const d = deltaInfo?.byName?.get(v.name);
        const dW = d?.w || { text: "■ --", fill: "#6b7280" };
        const dR = d?.r || { text: "■ --", fill: "#6b7280" };
        return `
          <rect x="${cx - barW - barGap/2}" y="${wY}" width="${barW}" height="${wBarH}" rx="3" fill="#6aa0d1" />
          <rect x="${cx + barGap/2}" y="${rY}" width="${barW}" height="${rBarH}" rx="3" fill="#c8c8c8" />
          <text x="${cx - barW/2 - barGap/2}" y="${wY - 6}" text-anchor="middle" font-size="10" fill="#2e6fd0" font-weight="700">${Math.round(v.weight)}%</text>
          <text x="${cx + barW/2 + barGap/2}" y="${rY - 6}" text-anchor="middle" font-size="10" fill="#9ca3af" font-weight="700">${Math.round(v.ret)}%</text>
          <text x="${cx}" y="${margin.top + plotH + 20}" text-anchor="middle" font-size="12" fill="#111827">${v.name}</text>
          <text x="${cx}" y="${margin.top + plotH + 34}" text-anchor="middle" font-size="9" fill="${dW.fill}" font-weight="700">${dW.text}</text>
          <text x="${cx}" y="${margin.top + plotH + 46}" text-anchor="middle" font-size="9" fill="${dR.fill}" font-weight="700">${dR.text}</text>
        `;
      }).join("");

      const svg = `
        <svg width="${chartW}" height="${chartH}" viewBox="0 0 ${chartW} ${chartH}" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="${chartW}" height="${chartH}" fill="#f3f4f6" />
          ${gridLines}
          <line x1="${margin.left}" y1="${margin.top + plotH}" x2="${chartW - margin.right}" y2="${margin.top + plotH}" stroke="#475569" stroke-width="1.5" />
          ${bars}
        </svg>
      `;
      distChart.innerHTML = svg;
    }

    function renderHoldings(rows, groupSummaries = new Map()) {
      if (!rows.length) {
        holdingsBody.innerHTML = `<tr class="empty-row"><td colspan="${visibleColumnCount()}">查無持股資料</td></tr>`;
        return;
      }

      const sortBy = sortByEl.value;
      const sortDir = sortDirEl.value;
      const groupOrder = [];
      const grouped = new Map();
      rows.forEach((r) => {
        const key = r.account || "未分類";
        if (!grouped.has(key)) {
          grouped.set(key, []);
          groupOrder.push(key);
        }
        grouped.get(key).push(r);
      });

      const body = [];
      const colspan = visibleColumnCount();
      const sumCols = [idx.marketValue, idx.profit, idx.monthlyIncome, idx.profitWithDividend];
      const groupPalette = [
        { bg: "#e9f2ff", border: "#c6d8f2" },
        { bg: "#e8f7ef", border: "#c7e8d4" },
        { bg: "#fff5e6", border: "#f0dbb8" },
        { bg: "#f1ecff", border: "#d9cef9" },
        { bg: "#e8f7f8", border: "#c3e4e8" },
        { bg: "#fff0f6", border: "#f3cde0" }
      ];

      groupOrder.forEach((account, groupIndex) => {
        const items = [...grouped.get(account)];
        const palette = groupPalette[groupIndex % groupPalette.length];
        const rowStyle = `style="--group-bg:${palette.bg};--group-border:${palette.border};"`;

        if (sortBy !== "sheet") {
          items.sort((a, b) => {
            const colIndex = Number(sortBy);
            const av = toNumber(a.cells[colIndex]);
            const bv = toNumber(b.cells[colIndex]);
            const safeA = Number.isFinite(av) ? av : (sortDir === "asc" ? Number.POSITIVE_INFINITY : Number.NEGATIVE_INFINITY);
            const safeB = Number.isFinite(bv) ? bv : (sortDir === "asc" ? Number.POSITIVE_INFINITY : Number.NEGATIVE_INFINITY);
            return sortDir === "asc" ? safeA - safeB : safeB - safeA;
          });
        } else {
          items.sort((a, b) => a.sheetOrder - b.sheetOrder);
        }

        body.push(`<tr class="group-row" ${rowStyle}><td colspan="${colspan}"><span class="account-tag">${account}</span></td></tr>`);
        const repeatHeadCells = [td("帳戶")];
        repeatHeadCells.push(...visibleColumns.map((col) => td(col.label)));
        body.push(`<tr class="group-head-repeat" ${rowStyle}>${repeatHeadCells.join("")}</tr>`);

        items.forEach((row) => {
          const cols = [td(row.account || "--")];
          cols.push(...visibleColumns.map((col) => {
            const rawValue = row.cells[col.index] || "--";
            const value = maskValueIfNeeded(rawValue, col.index);
            const needColor = [idx.move, idx.profit, idx.profitRate, idx.profitWithDividend, idx.profitWithDividendRate].includes(col.index);
            if (!needColor) return td(value);
            const isMoveCol = col.index === idx.move;
            return td(value, isMoveCol ? classByValue(rawValue) : classByValueBlackPositive(rawValue));
          }));
          body.push(`<tr>${cols.join("")}</tr>`);
        });

        const summaryRow = groupSummaries.get(account) || null;
        let subtotalCells = [td("小計")];
        subtotalCells.push(...visibleColumns.map((col) => {
          if (!sumCols.includes(col.index)) return "<td></td>";
          const fromSheet = summaryRow ? summaryRow[col.index] : "";
          const hasSheetValue = String(fromSheet || "").trim() !== "";
          const sum = items.reduce((acc, r) => acc + (toNumber(r.cells[col.index]) || 0), 0);
          const txt = hasSheetValue
            ? String(fromSheet)
            : (Number.isFinite(sum) ? sum.toLocaleString("en-US") : "--");
          const maskedTxt = maskValueIfNeeded(txt, col.index);
          const needColor = [idx.profit, idx.profitWithDividend].includes(col.index);
          if (!needColor) return td(maskedTxt);
          const forColor = hasSheetValue ? String(fromSheet) : String(sum);
          const klass = classByValueBlackPositive(forColor);
          return td(maskedTxt, klass);
        }));
        body.push(`<tr class="subtotal-row">${subtotalCells.join("")}</tr>`);

        if (groupIndex < groupOrder.length - 1) {
          body.push(`<tr class="group-gap"><td colspan="${colspan}"></td></tr>`);
        }
      });

      holdingsBody.innerHTML = body.join("");
    }

    function renderKpis(summary) {
      if (!summary) return;
      kpiEls.marketValue.textContent = currency(summary[idx.marketValue]);
      kpiEls.cost.textContent = currency(summary[idx.holdingCost]);
      kpiEls.profit.textContent = currency(summary[idx.profit]);
      kpiEls.dividend.textContent = currency(summary[idx.accDividend]);
      kpiEls.profitWithDividend.textContent = currency(summary[idx.profitWithDividend]);
      kpiEls.monthlyIncome.textContent = currency(summary[idx.monthlyIncome]);

      kpiEls.profit.className = classByValueBlackPositive(summary[idx.profit]);
      kpiEls.profitWithDividend.className = classByValueBlackPositive(summary[idx.profitWithDividend]);
    }

    function snapshotMetricValue(snapshot, metric) {
      if (!snapshot || !snapshot.metrics) return NaN;
      const read = (name) => {
        const v = snapshot.metrics[name]?.value;
        return Number.isFinite(v) ? v : NaN;
      };
      if (metric === "含息損益") {
        const net = read("淨損益");
        const div = read("配息");
        if (Number.isFinite(net) && Number.isFinite(div)) return net + div;
        return NaN;
      }
      return read(metric);
    }

    function findBaselineSnapshot(history, currentMarketValue) {
      const snapshots = history?.snapshots || [];
      if (!snapshots.length || !Number.isFinite(currentMarketValue)) return null;
      for (let i = snapshots.length - 1; i >= 0; i -= 1) {
        const s = snapshots[i];
        const mv = snapshotMetricValue(s, "現值");
        if (!Number.isFinite(mv)) continue;
        if (mv !== currentMarketValue) return s;
      }
      return null;
    }

    function formatSignedNumber(n) {
      const abs = Math.abs(n);
      const txt = abs.toLocaleString("en-US");
      return `${n >= 0 ? "+" : "-"}${txt}`;
    }

    function setRefreshingUI(isRefreshing) {
      if (!refreshSpinner) return;
      refreshSpinner.classList.toggle("active", !!isRefreshing);
    }

    function formatCompareTimestamp(timestampText, reportDateText) {
      const ts = String(timestampText || "").trim();
      if (!ts || ts === "--") return "--";
      const reportDate = normalizeReportDate(reportDateText);
      const m = ts.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[ T](\d{1,2}:\d{2}:\d{2}))?/);
      if (!m) return ts;
      const yyyy = m[1];
      const mm = m[2].padStart(2, "0");
      const dd = m[3].padStart(2, "0");
      const hhmmss = m[4] || "";
      const normalizedDate = `${yyyy}/${mm}/${dd}`;
      if (reportDate && normalizedDate === reportDate && hhmmss) {
        return hhmmss;
      }
      return `${normalizedDate}${hhmmss ? ` ${hhmmss}` : ""}`;
    }

    function setKpiDelta(el, current, prev) {
      if (!el || !Number.isFinite(current) || !Number.isFinite(prev)) {
        if (el) {
          el.textContent = "■ --";
          el.className = "kpi-delta flat";
        }
        return;
      }
      const delta = current - prev;
      const pct = prev === 0 ? NaN : (delta / Math.abs(prev)) * 100;
      const icon = delta > 0 ? "▲" : (delta < 0 ? "▼" : "■");
      const cls = delta > 0 ? "up" : (delta < 0 ? "down" : "flat");
      const pctText = Number.isFinite(pct) ? `${delta >= 0 ? "+" : "-"}${Math.abs(pct).toFixed(2)}%` : "--";
      if (moneyMasked) {
        el.textContent = `${icon} ${MONEY_MASK_TEXT} (${pctText})`;
      } else {
        el.textContent = `${icon} ${formatSignedNumber(delta)} (${pctText})`;
      }
      el.className = `kpi-delta ${cls}`;
    }

    function renderKpiDeltas(summary, history) {
      const current = {
        marketValue: toNumber(summary?.[idx.marketValue]),
        profit: toNumber(summary?.[idx.profit])
      };
      const prevSnapshot = findBaselineSnapshot(history, current.marketValue);
      const previous = {
        marketValue: snapshotMetricValue(prevSnapshot, "現值"),
        profit: snapshotMetricValue(prevSnapshot, "淨損益")
      };

      setKpiDelta(kpiDeltaEls.marketValue, current.marketValue, previous.marketValue);
      setKpiDelta(kpiDeltaEls.profit, current.profit, previous.profit);

      if (prevSnapshot) {
        const mvRawText = prevSnapshot.metrics?.["現值"]?.text || "--";
        const mvText = moneyMasked ? MONEY_MASK_TEXT : mvRawText;
        const tsText = formatCompareTimestamp(prevSnapshot.timestamp || "--", prevSnapshot.reportDate || "");
        const dText = prevSnapshot.reportDate || "--";
        kpiCompareInfo.textContent = `比較基準：${dText}${tsText !== "--" ? ` ${tsText}` : ""}（總市值 ${mvText}）`;
      } else {
        kpiCompareInfo.textContent = `比較基準：未找到（history daily=${history?.daily?.length || 0}, snapshots=${history?.snapshots?.length || 0}）`;
      }
    }

    function triggerImmediateRefresh() {
      const now = Date.now();
      if (now - lastRefreshTriggeredAt < 5000) return;

    function parseRows(data) {
      const allRows = data?.valueRanges?.[0]?.values || [];
      if (!allRows.length) return { headerRow: null, summary: null, groups: [], holdings: [], groupSummaries: new Map() };
      const headerRow = allRows[0] || [];
      resolveColumnIndexes(headerRow);
      const rows = allRows.slice(1);
      const summary = rows.find((r) => (r[idx.name] || "").trim() === "全帳戶") || null;
      const groups = [];
      const groupSummaries = new Map();

      let currentGroup = "未分類";
      const holdings = [];
      let sheetOrder = 0;

      rows.forEach((r) => {
        const name = (r[idx.name] || "").trim();
        const hasStarMarkedCell = r.some((cell) => String(cell || "").trim().startsWith("*"));
        const accountMarkerCell = r.find((cell) => String(cell || "").trim().startsWith("#"));
        const accountMarker = accountMarkerCell ? String(accountMarkerCell).trim().replace(/^#/, "").trim() : "";
        if (accountMarker) {
          currentGroup = accountMarker;
          groups.push(r);
          groupSummaries.set(currentGroup, r);
          return;
        }
        if (!name || name === "全帳戶") return;
        // Skip title/helper rows: any cell in this row starts with "*".
        if (hasStarMarkedCell) {
          return;
        }
        if (!(r[idx.price] || r[idx.marketValue] || r[idx.profit])) return;

        holdings.push({
          sheetOrder: sheetOrder++,
          account: currentGroup,
          cells: r
        });
      });

      return { headerRow, summary, groups, holdings, groupSummaries };
    }

    function parseSpreadsheetId(inputText) {
      const src = String(inputText || "").trim();
      if (!src) return "";
      const m = src.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (m) return m[1];
      if (/^[a-zA-Z0-9-_]{20,}$/.test(src)) return src;
      return "";
    }

    async function loadLinkedSheet(userId) {
      if (!supabaseClient || !userId) return;
      const { data, error } = await supabaseClient
        .from("user_sheets")
        .select("id, sheet_url, spreadsheet_id, last_synced_at")
        .eq("user_id", userId)
        .eq("is_active", true)
        .order("updated_at", { ascending: false })
        .limit(1);
      if (error) {
        setSheetBindStatus(`讀取綁定失敗：${error.message}`, true);
        return;
      }
      const row = Array.isArray(data) && data.length ? data[0] : null;
      if (!row) {
        currentLinkedSheetRowId = "";
        btnSyncNow.disabled = true;
        sheetUrlInput.value = "";
        setSheetBindStatus("尚未綁定 Google Sheet");
        setSyncStatus("待命");
        configureAutoSync();
        return;
      }
      currentLinkedSheetRowId = row.id || "";
      btnSyncNow.disabled = false;
      sheetUrlInput.value = row.sheet_url || row.spreadsheet_id || "";
      const synced = row.last_synced_at
        ? `，上次同步：${new Date(row.last_synced_at).toLocaleString("zh-TW")}`
        : "";
      setSheetBindStatus(`已綁定：${row.spreadsheet_id}${synced}`);
      setSyncStatus(row.last_synced_at ? `已同步（${new Date(row.last_synced_at).toLocaleString("zh-TW")}）` : "待命");
      configureAutoSync();
    }

    async function saveLinkedSheet() {
      if (!supabaseClient || !currentUserId) {
        setSheetBindStatus("請先登入再綁定 Sheet", true);
        return;
      }
      const sheetUrl = String(sheetUrlInput.value || "").trim();
      const spreadsheetId = parseSpreadsheetId(sheetUrl);
      if (!spreadsheetId) {
        setSheetBindStatus("格式錯誤：請貼 Google Sheet 網址或 spreadsheetId", true);
        return;
      }
      setSheetBindStatus("綁定中...");
      btnSaveSheetLink.disabled = true;
      try {
        const { error: clearError } = await supabaseClient
          .from("user_sheets")
          .update({ is_active: false })
          .eq("user_id", currentUserId)
          .eq("is_active", true);
        if (clearError) throw clearError;

        const { error: upsertError } = await supabaseClient
          .from("user_sheets")
          .upsert(
            {
              user_id: currentUserId,
              sheet_url: sheetUrl,
              spreadsheet_id: spreadsheetId,
              is_active: true
            },
            {
              onConflict: "user_id,spreadsheet_id"
            }
          );
        if (upsertError) throw upsertError;
        await loadLinkedSheet(currentUserId);
        setSheetBindStatus(`已綁定：${spreadsheetId}`);
      } catch (err) {
        setSheetBindStatus(`綁定失敗：${err.message || err}`, true);
      } finally {
        btnSaveSheetLink.disabled = false;
      }
    }

    async function syncNow({ fromAuto = false } = {}) {
      if (!currentUserId || !currentLinkedSheetRowId) {
        if (!fromAuto) setSyncStatus("請先綁定 Sheet", true);
        return;
      }
      if (isSyncInProgress) return;
      const sbAccessToken = await getSupabaseAccessToken();
      if (!sbAccessToken) {
        if (!fromAuto) setSyncStatus("請先重新登入", true);
        return;
      }
      isSyncInProgress = true;
      btnSyncNow.disabled = true;
      setSyncStatus(fromAuto ? "自動同步中..." : "同步中...");
      try {
        const headers = {
          "Content-Type": "application/json",
          Authorization: `Bearer ${sbAccessToken}`
        };
        const res = await fetch(SYNC_API_URL, {
          method: "POST",
          credentials: "include",
          headers,
          body: JSON.stringify({})
        });
        if (!res.ok) {
          const text = await res.text();
          let parsed = null;
          try {
            parsed = JSON.parse(text);
          } catch (_err) {
            parsed = null;
          }
          if (!fromAuto && parsed?.error === "GoogleNotLinked") {
            setSyncStatus("尚未連接 Google Sheet 存取，導向授權中...");
            await redirectToGoogleSheetsLink();
            return;
          }
          throw new Error(parsed?.message || text);
        }
        await res.json();
        await loadData();
        await loadLinkedSheet(currentUserId);
        setSyncStatus(`${fromAuto ? "自動" : ""}完成（${new Date().toLocaleString("zh-TW")}）`);
      } catch (err) {
        if (!fromAuto) {
          setSyncStatus(`失敗（${err.message || err}）`, true);
        } else {
          setSyncStatus("自動同步失敗（稍後重試）", true);
        }
      } finally {
        isSyncInProgress = false;
        btnSyncNow.disabled = !currentLinkedSheetRowId;
      }
    }

    function readApiTokenFromHash() {
      const raw = String(window.location.hash || "");
      if (!raw || !raw.startsWith("#")) return "";
      const qs = new URLSearchParams(raw.slice(1));
      const token = (qs.get("st_token") || "").trim();
      if (!token) return "";
      localStorage.setItem(API_TOKEN_STORAGE_KEY, token);
      const cleanUrl = `${window.location.pathname}${window.location.search}`;
      window.history.replaceState({}, "", cleanUrl);
      return token;
    }

    function clearAuthRedirectFlags() {
      sessionStorage.removeItem(AUTH_REDIRECT_TRIED_KEY);
      sessionStorage.removeItem(AUTH_REDIRECT_AT_KEY);
    }

    async function loadData() {
      lastRefreshTriggeredAt = Date.now();
      statusText.textContent = "更新中...";
      setRefreshingUI(true);
      try {
        let data = null;
        let loadedFromCache = false;
        let sbAccessToken = "";

        if (SUPABASE_LOGIN_ENABLED && supabaseClient && currentUserId) {
          sbAccessToken = await getSupabaseAccessToken();
          if (sbAccessToken) {
            const cacheRes = await fetch(API_CACHED_URL, {
              cache: "no-store",
              headers: {
                Authorization: `Bearer ${sbAccessToken}`
              }
            });
            if (cacheRes.ok) {
              const cacheJson = await cacheRes.json();
              data = cacheJson.data || null;
              loadedFromCache = !!data;
            }
          }
        }

        if (!data) {
          const tokenFromHash = readApiTokenFromHash();
          const apiToken = tokenFromHash || localStorage.getItem(API_TOKEN_STORAGE_KEY) || "";
          const fetchOptions = {
            cache: "no-store",
            credentials: "include"
          };
          if (sbAccessToken) {
            fetchOptions.headers = { Authorization: `Bearer ${sbAccessToken}` };
          } else if (apiToken) {
            fetchOptions.headers = { Authorization: `Bearer ${apiToken}` };
          }
          const res = await fetch(API_URL, fetchOptions);
          if (res.status === 401) {
            const unauthorizedText = await res.text();
            let unauthorizedJson = null;
            try {
              unauthorizedJson = JSON.parse(unauthorizedText);
            } catch (_err) {
              unauthorizedJson = null;
            }
            if (unauthorizedJson?.error === "GoogleNotLinked" && sbAccessToken) {
              statusText.textContent = "尚未連接 Google Sheet 存取，導向授權中...";
              await redirectToGoogleSheetsLink();
              return;
            }
            const tried = sessionStorage.getItem(AUTH_REDIRECT_TRIED_KEY) === "1";
            const triedAt = Number(sessionStorage.getItem(AUTH_REDIRECT_AT_KEY) || 0);
            const elapsed = Date.now() - triedAt;
            if (tried && (!Number.isFinite(triedAt) || elapsed > 2 * 60 * 1000)) {
              clearAuthRedirectFlags();
            }
            const canRetry = sessionStorage.getItem(AUTH_REDIRECT_TRIED_KEY) !== "1";
            if (canRetry) {
              sessionStorage.setItem(AUTH_REDIRECT_TRIED_KEY, "1");
              sessionStorage.setItem(AUTH_REDIRECT_AT_KEY, String(Date.now()));
              statusText.textContent = "未登入，導向 Google 授權...";
              const returnTo = encodeURIComponent(window.location.href);
              window.location.href = `${AUTH_URL}?returnTo=${returnTo}`;
              return;
            }
            localStorage.removeItem(API_TOKEN_STORAGE_KEY);
            throw new Error(unauthorizedJson?.message || "Unauthorized after login redirect.");
          }
          if (!res.ok) {
            const raw = await res.text();
            let parsed = null;
            try {
              parsed = JSON.parse(raw);
            } catch (_err) {
              parsed = null;
            }
            throw new Error(parsed?.message || raw);
          }
          clearAuthRedirectFlags();
          data = await res.json();
        }

        const { headerRow, summary, groups, holdings, groupSummaries } = parseRows(data);
        const distItems = parseDistribution(data);
        const history = parseHistory(data);
        latestSummary = summary;
        latestHoldings = holdings;
        latestGroupSummaries = groupSummaries;
        latestDistItems = distItems;
        latestDistDeltaInfo = buildDistributionDeltaInfo(distItems, summary, history);
        latestHistoryRows = history.rows;
        latestHistoryDaily = history.daily;
        latestHistoryLatest = history.latest;
        latestHistorySnapshots = history.snapshots || [];
        updateHistoryDateBounds(history.daily);
        renderTableHeaders(headerRow);
        renderKpis(summary);
        renderKpiDeltas(summary, history);
        renderAlloc(groups, holdings);
        renderDistribution(distItems, latestDistDeltaInfo);
        renderHistoryTrendChart(history.daily);
        renderHoldings(holdings, groupSummaries);
        statusText.textContent = loadedFromCache ? "已更新（快取）" : "已更新";
        updatedAt.textContent = new Date().toLocaleString("zh-TW");
      } catch (err) {
        console.error(err);
        if (String(err?.message || "").includes("Unauthorized after login redirect")) {
          statusText.textContent = "更新失敗（授權逾時，請重新整理重試）";
        } else {
          statusText.textContent = "更新失敗";
        }
      } finally {
        setRefreshingUI(false);
      }
    }

    const COLLAPSE_STORAGE_PREFIX = "invest_section_collapsed_";

    function collapseKey(sectionEl, index) {
      if (sectionEl?.id) return `${COLLAPSE_STORAGE_PREFIX}${sectionEl.id}`;
      return `${COLLAPSE_STORAGE_PREFIX}section_${index}`;
    }

    function setCollapseState(sectionEl, btn, collapsed) {
      sectionEl.classList.toggle("is-collapsed", collapsed);
      btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
    }

    renderAutoVersion();
    document.querySelectorAll(".collapsible-toggle").forEach((btn, index) => {
      const section = btn.closest(".collapsible-section");
      if (!section) return;

      const key = collapseKey(section, index);
      const stored = localStorage.getItem(key);
      if (stored === "1") setCollapseState(section, btn, true);
      if (stored === "0") setCollapseState(section, btn, false);

      btn.addEventListener("click", () => {
        const isCollapsed = section.classList.toggle("is-collapsed");
        btn.setAttribute("aria-expanded", isCollapsed ? "false" : "true");
        localStorage.setItem(key, isCollapsed ? "1" : "0");
        if (!isCollapsed && section.querySelector("#distChart")) {
          renderDistribution(latestDistItems, latestDistDeltaInfo);
        }
        if (!isCollapsed && section.querySelector("#historyTrendChart")) {
          renderHistoryTrendChart(latestHistoryDaily);
        }
      });
    });
    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (latestDistItems.length > 0) {
          renderDistribution(latestDistItems, latestDistDeltaInfo);
        }
        if (latestHistoryDaily.length > 0) {
          renderHistoryTrendChart(latestHistoryDaily);
        }
      }, 120);
    });
    histY1Select.addEventListener("change", () => renderHistoryTrendChart(latestHistoryDaily));
    histY2Select.addEventListener("change", () => renderHistoryTrendChart(latestHistoryDaily));
    histRangeSelect.addEventListener("change", () => renderHistoryTrendChart(latestHistoryDaily));
    histFromDate.addEventListener("change", () => renderHistoryTrendChart(latestHistoryDaily));
    histToDate.addEventListener("change", () => renderHistoryTrendChart(latestHistoryDaily));
    sortByEl.addEventListener("change", () => renderHoldings(latestHoldings, latestGroupSummaries));
    sortDirEl.addEventListener("change", () => renderHoldings(latestHoldings, latestGroupSummaries));
    btnLoginGoogle.addEventListener("click", loginWithGoogle);
    btnLogout.addEventListener("click", logoutSupabase);
    btnSaveSheetLink.addEventListener("click", saveLinkedSheet);
    btnSyncNow.addEventListener("click", syncNow);
    syncModeSelect.addEventListener("change", () => {
      setSyncMode(syncModeSelect.value, { persist: true });
      if (syncMode === "auto") {
        syncNow({ fromAuto: true });
      }
    });
    btnOpenSettings.addEventListener("click", () => setSettingsOpen(true));
    if (btnToggleMoney) {
      btnToggleMoney.addEventListener("click", () => {
        setMoneyMasked(!moneyMasked);
      });
    }
    btnBackSettings.addEventListener("click", () => setSettingsOpen(false));
    btnCloseSettings.addEventListener("click", () => setSettingsOpen(false));
    settingsBackdrop.addEventListener("click", () => setSettingsOpen(false));
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") setSettingsOpen(false);
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) triggerImmediateRefresh();
    });
    window.addEventListener("focus", () => {
      triggerImmediateRefresh();
    });
    sheetUrlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        saveLinkedSheet();
      }
    });

    (async () => {
      setSettingsOpen(false);
      applyMoneyMaskUI();
      setSyncMode("manual", { persist: false });
      const ready = await ensureSupabaseAuth();
      if (!ready) return;
      await loadData();
      refreshTimer = setInterval(loadData, REFRESH_MS);
    })();
  </script>
</body>
</html>
