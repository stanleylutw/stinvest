<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 26px 'Noto Sans TC', 'PingFang TC', sans-serif; fill: #1f2937; }
      .axis { stroke: #6b7280; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .label { font: 13px 'Noto Sans TC', 'PingFang TC', sans-serif; fill: #374151; }
      .small { font: 12px 'Noto Sans TC', 'PingFang TC', sans-serif; fill: #6b7280; }
      .bubbleText { font: 12px 'Noto Sans TC', 'PingFang TC', sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="560" fill="#f8fafc"/>
  <text x="40" y="44" class="title">風險-報酬散點圖（示意）</text>

  <rect x="100" y="90" width="760" height="390" fill="#ffffff" stroke="#d1d5db"/>

  <line x1="100" y1="480" x2="860" y2="480" class="axis"/>
  <line x1="100" y1="90" x2="100" y2="480" class="axis"/>

  <line x1="100" y1="402" x2="860" y2="402" class="grid"/>
  <line x1="100" y1="324" x2="860" y2="324" class="grid"/>
  <line x1="100" y1="246" x2="860" y2="246" class="grid"/>
  <line x1="100" y1="168" x2="860" y2="168" class="grid"/>

  <line x1="252" y1="90" x2="252" y2="480" class="grid"/>
  <line x1="404" y1="90" x2="404" y2="480" class="grid"/>
  <line x1="556" y1="90" x2="556" y2="480" class="grid"/>
  <line x1="708" y1="90" x2="708" y2="480" class="grid"/>

  <text x="90" y="486" class="small" text-anchor="end">0%</text>
  <text x="90" y="408" class="small" text-anchor="end">30%</text>
  <text x="90" y="330" class="small" text-anchor="end">60%</text>
  <text x="90" y="252" class="small" text-anchor="end">90%</text>
  <text x="90" y="174" class="small" text-anchor="end">120%</text>

  <text x="100" y="505" class="small" text-anchor="middle">0%</text>
  <text x="252" y="505" class="small" text-anchor="middle">10%</text>
  <text x="404" y="505" class="small" text-anchor="middle">20%</text>
  <text x="556" y="505" class="small" text-anchor="middle">30%</text>
  <text x="708" y="505" class="small" text-anchor="middle">40%</text>
  <text x="860" y="505" class="small" text-anchor="middle">50%</text>

  <text x="480" y="540" class="label" text-anchor="middle">X 軸：總投資佔比（%）</text>
  <text x="28" y="290" class="label" transform="rotate(-90 28 290)" text-anchor="middle">Y 軸：含息報酬率（%）</text>

  <line x1="100" y1="285" x2="860" y2="285" stroke="#f59e0b" stroke-dasharray="6 6"/>
  <text x="866" y="289" class="small">組合平均報酬</text>

  <circle cx="582" cy="186" r="58" fill="#ef4444" fill-opacity="0.35" stroke="#b91c1c" stroke-width="2"/>
  <text x="582" y="186" class="bubbleText" text-anchor="middle">台股ETF</text>

  <circle cx="492" cy="162" r="46" fill="#f97316" fill-opacity="0.35" stroke="#c2410c" stroke-width="2"/>
  <text x="492" y="162" class="bubbleText" text-anchor="middle">台股基金</text>

  <circle cx="468" cy="325" r="44" fill="#3b82f6" fill-opacity="0.35" stroke="#1d4ed8" stroke-width="2"/>
  <text x="468" y="325" class="bubbleText" text-anchor="middle">美股ETF/基金</text>

  <circle cx="232" cy="418" r="34" fill="#22c55e" fill-opacity="0.35" stroke="#15803d" stroke-width="2"/>
  <text x="232" y="418" class="bubbleText" text-anchor="middle">美債</text>

  <circle cx="182" cy="154" r="18" fill="#a855f7" fill-opacity="0.35" stroke="#6d28d9" stroke-width="2"/>
  <text x="182" y="154" class="bubbleText" text-anchor="middle">台股個股</text>

  <circle cx="146" cy="338" r="26" fill="#14b8a6" fill-opacity="0.35" stroke="#0f766e" stroke-width="2"/>
  <text x="146" y="338" class="bubbleText" text-anchor="middle">FCN</text>

  <rect x="680" y="102" width="160" height="84" fill="#fff" stroke="#d1d5db" rx="8"/>
  <text x="692" y="126" class="small">泡泡大小：現值</text>
  <text x="692" y="146" class="small">X：投資佔比</text>
  <text x="692" y="166" class="small">Y：含息報酬率</text>
</svg>
